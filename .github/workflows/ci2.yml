name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # 新增：开启手动触发按钮

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Test
        run: ./gradlew test

      - name: Shadow JAR
        run: ./gradlew shadowJar

      - name: Upload JAR
        if: matrix.java == 17
        uses: actions/upload-artifact@v4
        with:
          name: burp-rest-extension
          path: build/libs/burp-rest-extension.jar
          retention-days: 30
